<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Flo and Tell</title>
    <meta name="description" content="Period tracking made cute and simple" />
    <meta name="author" content="Lovable" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Flo & Tell" />
    <meta name="application-name" content="Flo & Tell" />
    <meta
      name="theme-color"
      content="#FFB6C1"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1a1a1a"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="msapplication-TileColor" content="#FFB6C1" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Flo and Tell" />
    <meta
      property="og:description"
      content="Period tracking made cute and simple"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/flo.png" />
    <meta property="og:url" content="https://flo-fomo.lovable.app" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="/flo.png" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://ocghxwwwuubgmwsxgyoy.supabase.co" />
    <link rel="dns-prefetch" href="https://ocghxwwwuubgmwsxgyoy.supabase.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon & App Icons -->
    <link
      rel="preload"
      href="/icons/icon-192x192.png"
      as="image"
      type="image/png"
    />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/icons/icon-192x192.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/icon-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="167x167"
      href="/icons/icon-192x192.png"
    />

    <!-- iOS Splash Screens (optional - uses theme color as fallback) -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Critical inline styles to prevent FOUC -->
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        background: #faf9f8;
      }
      @media (prefers-color-scheme: dark) {
        #root {
          background: #0a0a0a;
        }
      }
      /* Safe area padding for notched devices */
      .safe-top {
        padding-top: env(safe-area-inset-top);
      }
      .safe-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .safe-left {
        padding-left: env(safe-area-inset-left);
      }
      .safe-right {
        padding-right: env(safe-area-inset-right);
      }
    </style>

    <!-- Load fonts with display=swap for fast text rendering -->
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Quicksand:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Quicksand:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
