
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#141110">
    <meta name="description" content="A professional musical composition tool for exploring harmony, scales, and chord progressions.">
    <title>Harmonic Studio</title>
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Harmonic">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            colors: {
              border: "var(--border)",
              input: "var(--input)",
              ring: "var(--ring)",
              background: "var(--bg-main)",
              foreground: "var(--text-main)",
            }
          }
        },
        safelist: [
          { pattern: /text-(emerald|sky|rose|stone)-(100|400|500|600|900)/, variants: ['dark'] },
          { pattern: /bg-(emerald|sky|rose|stone)-(100|400|500|900|950)(\/(10|20|30|40|50))?/, variants: ['hover', 'dark', 'dark:hover'] },
          { pattern: /border-(emerald|sky|rose|stone)-(500)(\/(30|40|50))?/, variants: ['dark'] }
        ]
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        /* 
         * --- LIGHT THEME (Default) ---
         */
        --bg-main: #fafaf9;       /* stone-50 */
        --bg-panel: #ffffff;      /* white */
        --bg-surface: #f5f5f4;    /* stone-100 */
        --bg-element: #e7e5e4;    /* stone-200 */
        --bg-glass: rgba(255, 255, 255, 0.85);
        
        --text-main: #0c0a09;     /* stone-950 */
        --text-muted: #57534e;    /* stone-600 */
        --text-dim: #a8a29e;      /* stone-400 */
        
        --border: #e7e5e4;        /* stone-200 */
        --border-hover: #d6d3d1;  /* stone-300 */
        --border-soft: rgba(0, 0, 0, 0.1);
        
        --accent: #dc2626;        /* red-600 */

        --bg-soft: rgba(0, 0, 0, 0.05);
        --bg-soft-hover: rgba(0, 0, 0, 0.08);
        
        /* --- MOTION CURVES --- */
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      [data-theme="dark"] {
        /* 
         * --- DARK THEME ---
         */
        --bg-main: #0c0a09;       /* stone-950 */
        --bg-panel: #1c1917;      /* stone-900 */
        --bg-surface: #292524;    /* stone-800 */
        --bg-element: #1c1917;    /* stone-900 */
        --bg-glass: rgba(28, 24, 23, 0.85); 
        
        --text-main: #e7e5e4;     /* stone-200 */
        --text-muted: #a8a29e;    /* stone-400 */
        --text-dim: #57534e;      /* stone-600 */
        
        --border: #292524;        /* stone-800 */
        --border-hover: #44403c;  /* stone-700 */
        --border-soft: rgba(255, 255, 255, 0.1);
        
        --accent: #ef4444;        /* red-500 */
        
        --bg-soft: rgba(255, 255, 255, 0.05);
        --bg-soft-hover: rgba(255, 255, 255, 0.1);
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Utilities */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Interaction classes */
      .interact-base {
        transition-property: transform, opacity, background-color, border-color, box-shadow, color, filter;
        transition-duration: 300ms;
        transition-timing-function: var(--ease-out-expo);
        will-change: transform, opacity;
        backface-visibility: hidden;
        transform: translateZ(0);
      }
      
      .interact-lift:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px -10px rgba(0,0,0,0.15);
        border-color: var(--border-hover);
        z-index: 10;
      }
      .interact-lift:active {
        transform: translateY(0) scale(0.99);
        box-shadow: 0 2px 8px -4px rgba(0,0,0,0.1);
        transition-duration: 150ms;
      }

      .interact-lift-sm:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px -4px rgba(0,0,0,0.1);
        border-color: var(--border-hover);
        z-index: 5;
      }

      .interact-lift-sm:active {
        transform: translateY(0) scale(0.98);
        box-shadow: none;
        transition-duration: 100ms;
      }

      .interact-push:hover { transform: translateY(-1px); }
      .interact-push:active { transform: translateY(1px) scale(0.97); transition-duration: 100ms; }

      .interact-scale:hover { transform: scale(1.1); color: var(--text-main); }
      .interact-scale:active { transform: scale(0.9); transition-duration: 100ms; }
      
      .interact-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
        transform: translateY(-1px);
      }
    </style>
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          
          if (localTheme === 'dark' || (!localTheme && supportDarkMode)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0c0a09');
          } else {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#fafaf9');
          }
        } catch (e) {
          console.error(e);
        }
      })();
    </script>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "tone": "https://esm.sh/tone@14.7.77",
    "@tonaljs/tonal": "https://esm.sh/@tonaljs/tonal@4.10.0",
    "react-resizable-panels": "https://esm.sh/react-resizable-panels@2.0.19?deps=react@18.2.0,react-dom@18.2.0",
    "zustand": "https://esm.sh/zustand@4.5.2?deps=react@18.2.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "rollup-plugin-visualizer": "https://aistudiocdn.com/rollup-plugin-visualizer@^6.0.5",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => console.log('SW registered: ', registration))
            .catch(registrationError => console.log('SW registration failed: ', registrationError));
        });
      }
    </script>
  </body>
</html>
