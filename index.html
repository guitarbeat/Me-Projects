<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#141110">
    <meta name="description" content="A professional musical composition tool for exploring harmony, scales, and chord progressions.">
    <title>Harmonic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        /* 
         * --- COLOR PALETTE ---
         */
        --bg-main: #141110;       
        --bg-panel: #1c1817;      
        --bg-surface: #292422;    
        --bg-element: #38312e;    
        --bg-glass: rgba(28, 24, 23, 0.9); 
        
        --text-main: #d8c8b8; 
        --text-muted: #beb3ac; 
        --text-dim: #756a65;   
        
        --border: #38312e;        
        --border-hover: #5c504a;  
        
        --accent: #d13a34;        

        /* --- MOTION CURVES --- */
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      
      /* Utilities */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Interaction classes */
      .interact-base {
        transition-property: transform, opacity, background-color, border-color, box-shadow, color, filter;
        transition-duration: 300ms;
        transition-timing-function: var(--ease-out-expo);
        will-change: transform, opacity;
        backface-visibility: hidden;
        transform: translateZ(0);
      }
      
      .interact-lift:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px -10px rgba(0,0,0,0.3);
        border-color: var(--border-hover);
        z-index: 10;
      }
      .interact-lift:active {
        transform: translateY(0) scale(0.99);
        box-shadow: 0 2px 8px -4px rgba(0,0,0,0.1);
        transition-duration: 150ms;
      }

      .interact-lift-sm:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px -4px rgba(0,0,0,0.2);
        border-color: var(--border-hover);
        filter: brightness(1.05);
        z-index: 5;
      }
      .interact-lift-sm:active {
        transform: translateY(0) scale(0.98);
        box-shadow: none;
        transition-duration: 100ms;
      }

      .interact-push:hover { transform: translateY(-1px); filter: brightness(1.1); }
      .interact-push:active { transform: translateY(1px) scale(0.97); filter: brightness(0.95); transition-duration: 100ms; }

      .interact-scale:hover { transform: scale(1.1); color: var(--text-main); }
      .interact-scale:active { transform: scale(0.9); transition-duration: 100ms; }
      
      .interact-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
        transform: translateY(-1px);
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "rollup-plugin-visualizer": "https://aistudiocdn.com/rollup-plugin-visualizer@^6.0.5",
    "tone": "https://esm.sh/tone@14.7.77",
    "@tonaljs/tonal": "https://esm.sh/@tonaljs/tonal@4.10.0",
    "react-resizable-panels": "https://esm.sh/react-resizable-panels@2.0.19?deps=react@18.2.0,react-dom@18.2.0"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
