repos:
  - repo: local
    hooks:
      - id: lint
        name: Lint
        entry: npm run lint --prefix chrome-bookmarks-mcp
        language: system
        types: [javascript]
        files: ^chrome-bookmarks-mcp/
        pass_filenames: false

      - id: format
        name: Format
        entry: npm run format --prefix chrome-bookmarks-mcp
        language: system
        types: [javascript]
        files: ^chrome-bookmarks-mcp/
        pass_filenames: false
