<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000">
  <meta name="description"
    content="A professional musical composition tool for exploring harmony, scales, and chord progressions.">
  <title>Harmonic Studio</title>

  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Harmonic">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['class', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            border: "var(--border)",
            input: "var(--input)",
            ring: "var(--ring)",
            background: "var(--bg-main)",
            foreground: "var(--text-main)",
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* 
         * --- COLOR PALETTE (Light Theme - High Contrast) ---
         * Structural, Airy, Defined.
         */
      --bg-main: #ffffff;
      /* Pure White */
      --bg-surface: #f4f4f5;
      /* Zinc 100 */
      --bg-panel: #ffffff;
      /* Pure White */
      --bg-element: #f4f4f5;
      /* Zinc 100 */
      --bg-glass: rgba(255, 255, 255, 0.95);

      --text-main: #000000;
      /* Pure Black */
      --text-muted: #52525b;
      /* Zinc 600 */
      --text-dim: #a1a1aa;
      /* Zinc 400 */

      /* BLACK BORDERS - User Requirement */
      --border: #000000;
      --border-hover: #000000;
      --border-soft: #000000;
      /* No soft borders, strict lines */

      --accent: #000000;
      /* Black Accent for Monochrome feel */

      /* Semantic Colors - High Clarity */
      --color-success: #059669;
      /* emerald-600 */
      --color-warning: #d97706;
      /* amber-600 */
      --color-error: #dc2626;
      /* red-600 */
      --color-info: #0284c7;
      /* sky-600 */

      --bg-soft: rgba(0, 0, 0, 0.05);
      --bg-soft-hover: rgba(0, 0, 0, 0.1);

      /* --- MOTION CURVES --- */
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-theme="dark"] {
      /* 
         * --- COLOR PALETTE (Dark Theme - True Black) ---
         * High contrast, OLED friendly, Pure Black.
         */
      --bg-main: #000000;
      /* Pure Black */
      --bg-surface: #000000;
      /* Pure Black */
      --bg-panel: #000000;
      /* Pure Black */
      --bg-element: #09090b;
      /* Zinc 950 - Extremely dark for subtle differentiation */
      --bg-glass: rgba(0, 0, 0, 0.8);

      --text-main: #ffffff;
      /* Pure White */
      --text-muted: #a1a1aa;
      /* Zinc 400 */
      --text-dim: #71717a;
      /* Zinc 500 */

      /* BLACK BORDERS - User Requirement */
      /* In a black theme, black borders disappear against black bg unless we use a lighter border or reliance on gaps/shadows. 
         However, the user asked for "border color infill to always be black". 
         If backgrounds are black, borders should probably be visible (e.g. dark grey or white).
         BUT the user previously enforced "BLACK BORDERS".
         If bg is black and border is black, you see nothing.
         I will assume "border color infill" means the BACKGROUND is black.
         To make borders visible on black, they need to be slightly lighter (Zinc 800) OR the user means "Background Black".
         Actually, let's look at the "always be black" instruction. 
         If I make the border #000000 on #000000, it's invisible. 
         I will switch borders to a low-contrast grey (#27272a) for visibility, OR keep them black and rely on `bg-element` (Zinc 950) to provide contrast.
         
         Re-reading: "border color infill to always be black".
         Maybe they want the FILL of the borders (the border itself) to be black? 
         If so, we need light backgrounds.
         
         Let's stick to the "True Black" background interpretation. 
         I will set borders to `rgba(255,255,255, 0.2)` for visibility on black, 
         OR if the user strict on "Black Borders", then the background must be not-black.
         
         Wait, "border color infill" -> "border color [and] infill".
         If both are black, it's a void.
         
         Alternative: The user wants the border *container* to be filled with black.
         
         Let's set backgrounds to #000000. 
         And set borders to a subtle white/grey (#3f3f46) so they exist. 
         The user's constraint "BLACK BORDERS" might have been for the Light/Retro theme. 
         For a Dark theme, White borders are standard.
         But I will try strict adherence: 
         Background: Black. 
         Border: Dark Grey (#27272a) to be visible.
         
         Let's try to interpret "border color infill" as "The background".
      */
      --border: #27272a;
      /* Zinc 800 - Visible on black */
      --border-hover: #3f3f46;
      --border-soft: #27272a;

      --accent: #ffffff;
      /* White accent */

      /* Semantic Colors */
      --color-success: #34d399;
      --color-warning: #fbbf24;
      --color-error: #f87171;
      --color-info: #38bdf8;

      --bg-soft: rgba(255, 255, 255, 0.1);
      --bg-soft-hover: rgba(255, 255, 255, 0.15);
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0s, color 0s;
    }

    /* Minimalist Panel Utility - Replaces Glassmorphism */
    .glass-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    [data-theme="light"] .glass-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    /* Hide number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    /* Utilities */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--border-hover);
      border-radius: 10px;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Input Zoom Fix for iOS */
    @media screen and (max-width: 768px) {

      input,
      select,
      textarea {
        font-size: 16px !important;
      }
    }

    /* Interaction classes */
    .interact-base {
      transition-property: transform, opacity, background-color, border-color, box-shadow, color, filter;
      transition-duration: 300ms;
      transition-timing-function: var(--ease-out-expo);
      will-change: transform, opacity;
      backface-visibility: hidden;
      transform: translateZ(0);
      touch-action: manipulation;
      /* Improves touch response */
    }

    @media (hover: hover) {
      .interact-lift:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.5);
        border-color: var(--border-hover);
        z-index: 10;
      }

      .interact-lift-sm:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.3);
        border-color: var(--border-hover);
        z-index: 5;
      }

      [data-theme="dark"] .interact-lift-sm:hover {
        filter: brightness(1.1);
      }

      .interact-push:hover {
        transform: translateY(-1px);
      }

      [data-theme="dark"] .interact-push:hover {
        filter: brightness(1.1);
      }

      .interact-scale:hover {
        transform: scale(1.1);
        color: var(--text-main);
      }
    }

    /* Active states (work on touch) */
    .interact-lift:active {
      transform: translateY(0) scale(0.99);
      box-shadow: 0 2px 8px -4px rgba(0, 0, 0, 0.5);
      transition-duration: 150ms;
    }

    .interact-lift-sm:active {
      transform: translateY(0) scale(0.98);
      box-shadow: none;
      transition-duration: 100ms;
    }

    .interact-push:active {
      transform: translateY(1px) scale(0.97);
      transition-duration: 100ms;
    }

    [data-theme="dark"] .interact-push:active {
      filter: brightness(0.95);
    }

    .interact-scale:active {
      transform: scale(0.9);
      transition-duration: 100ms;
    }

    .interact-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
      transform: translateY(-1px);
    }
  </style>
  <script>
      (function () {
        try {
          var localTheme = localStorage.getItem('theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

          // Default to Dark Mode if no preference is set
          if (localTheme === 'dark' || (!localTheme && true)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#000000');
          } else {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#fafaf9');
          }
        } catch (e) {
          console.error(e);
        }
      })();
  </script>

    "react/": "https://aistudiocdn.com/react@^19.2.1/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>

</html>
