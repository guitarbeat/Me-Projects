<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Harmonic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #09090b; /* Zinc 950 */
        --surface-1: #18181b; /* Zinc 900 */
        --surface-2: #27272a; /* Zinc 800 */
        --accent: #3b82f6; /* Blue 500 */
        --accent-glow: rgba(59, 130, 246, 0.5);
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        margin: 0;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }

      .font-mono { font-family: 'JetBrains Mono', monospace; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Glass Effects */
      .glass {
        background: rgba(24, 24, 27, 0.7);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .glass-panel {
        background: rgba(9, 9, 11, 0.95);
        backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: -10px 0 40px rgba(0,0,0,0.5);
      }

      /* Background Patterns */
      .bg-grid {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      }

      .bg-dots {
        background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 20px 20px;
      }

      /* Animations */
      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 10px var(--accent-glow); }
        50% { box-shadow: 0 0 25px var(--accent-glow); }
      }
      .pulse-glow { animation: pulse-glow 2s infinite; }

      @keyframes pulse-slow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; transform: scale(0.98); }
      }
      .animate-pulse-slow {
        animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      /* SVG Styles */
      .cf-text { font-weight: 600; pointer-events: none; text-anchor: middle; dominant-baseline: middle; fill: var(--text-primary); text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
      .cf-slice { stroke: var(--bg-color); stroke-width: 2px; transition: all 0.2s ease; cursor: pointer; }
      .cf-slice:hover { filter: brightness(1.2); transform: scale(1.02); transform-origin: center; }

      /* Input Range Reset */
      input[type=range] { -webkit-appearance: none; background: transparent; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--text-primary); cursor: pointer; margin-top: -5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
      input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: var(--surface-2); }
    </style>
    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
