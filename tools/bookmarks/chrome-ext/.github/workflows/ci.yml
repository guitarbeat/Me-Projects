name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chrome-bookmarks-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # We don't have a lockfile initially committed, so we can't cache based on it yet.
          # Once package-lock.json is committed, uncomment the next lines:
          # cache: 'npm'
          # cache-dependency-path: chrome-bookmarks-mcp/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Check Formatting
        run: npm run check-format

  auto-merge:
    name: Enable Auto-Merge
    needs: lint-and-format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "$PR_URL" || echo "Auto-merge not enabled or failed"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
